  <link rel="preload" as="image" href="/img/self.webp" />
  <link rel="preload" as="image" href="/img/code.webp" />
  <link rel="preload" as="script" href="/__/firebase/8.3.0/firebase-app.js" />
  <link rel="preload" as="script" href="/__/firebase/8.3.0/firebase-firestore.js" />
  <link rel="modulepreload" href="/js/helpers.js" />
  <link rel="modulepreload" href="/js/renderers.js" />
  <link rel="modulepreload" href="/js/index.js" />

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css" integrity="sha512-NhSC1YmyruXifcj/KFRWoC561YpHpc5Jtzgvbuzx5VozKpWvQ+4nXhPdFgmx8xqexRcpAglTj9sIBWINXa8x5w==" crossorigin="anonymous" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Source+Sans+Pro:wght@300;700;900&display=swap" />
  <style type="text/css">
    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }
    html {
      scroll-behavior: smooth;
    }
    section {
      padding: 5em 2em;
    }
    img {
      display: block;
      aspect-ratio: auto;
      aspect-ratio: attr(width) / attr(height);
      height: auto;
      width: 100%;
    }
    .logo img {
      width: 48px;
      height: 48px;
    }
    nav, .hide {
      display: none;
    }
    .page-loading, .page-error {
      position: fixed;
      background: white;
      top: 0;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 1001;
    }
    .page-error {
      background: rgba(100,100,0,0.8);
      color: white;
      padding: 4rem;
    }
    @keyframes fadeIn {
      0% { opacity: 0; }
      100% { opacity: 1; }
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .spinner {
      margin: 20% auto;
      -ms-transform: translateY(-50%);
      transform: translateY(-50%);
      border: 8px solid #f3f3f3; /* Light grey */
      border-top: 8px solid #4299e1; /* Blue */
      border-radius: 50%;
      width: 80px;
      height: 80px;
      animation: spin 1.25s linear infinite, fadeIn 3s ease normal;
    }
    #services {
      background-image: url('/img/code.webp');
    }
  </style>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <!-- Status -->
  <div class="page-loading">
    <div class="spinner"></div>
  </div>
  <div class="page-error hide">
    <div class="page-error__content">
      <h3>Oopss!</h3>
      <div unselectable="on">Something went wrong.  The content on this page
        requires Firebase and other third-party assets to load correctly.  Please
        <a href="mailto:{MY_EMAIL}">contact me</a> if this issue continues.
      </div>
    </div>
  </div>
  <div class="page-controls hide">
    <a aria-label="Contact Me" href="#contact">
      <div class="page-controls__comment">
        <svg class="icon-comment" aria-hidden="true" focusable="false" role="image" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
          <path d="M113,0H15A15,15,0,0,0,0,15V79.57a15,15,0,0,0,15,15H38.28a1,1,0,0,1,1,1V121a7,7,0,0,0,11.95,4.95L82.31,94.87a1,1,0,0,1,.71-.29h30a15,15,0,0,0,15-15V15A15,15,0,0,0,113,0Zm9,79.57a9,9,0,0,1-9,9H83a7,7,0,0,0-4.95,2L47,121.7a1,1,0,0,1-1.71-.71V95.57a7,7,0,0,0-7-7H15a9,9,0,0,1-9-9V15a9,9,0,0,1,9-9h98a9,9,0,0,1,9,9Z"/>
        </svg>
      </div>
    </a>
  </div>
  <div class="page-modal hide">
    <div class="page-modal__content"></div>
  </div>

  <!-- Main Header -->
  <header>
    <!-- website logo -->
    <div class="logo">
      <a aria-label="{APP_DOMAIN} Logo" href="#top"><img src="/img/icons/manifest-icon-192.png" width="48" height="48" alt="" /></a>
    </div>

    <!-- Darkmode toggle -->
    <div class="darkmode-toggle">
      <input type="checkbox" id="darkmode-toggle" class="darkmode-toggle__checkbox" />
      <label for="darkmode-toggle" class="darkmode-toggle__label" />
    </div>

    <!-- navigation button to toggle on smaller screens -->
    <button class="nav-toggle" aria-label="Toggle Navigation">
      <span class="hamburger"></span>
    </button>

    <!-- website navigation -->
    <nav class="nav">
      <ul class="nav__list">
        <li class="nav__item"><a href="#home" class="nav__link">Home</a></li>
        <li class="nav__item"><a href="#services" class="nav__link">Skills</a></li>
        <li class="nav__item"><a href="#about" class="nav__link">About</a></li>
        <li class="nav__item"><a href="#work" class="nav__link">Work</a></li>
        <li class="nav__item"><a href="#contact" class="nav__link">Contact</a></li>
      </ul>
    </nav>
  </header>

  <!-- Introduction -->
  <section class="intro" id="home">
    <h1 class="section__title section__title--intro">Hello, I am <strong>{MY_NAME}</strong></h1>

    <p class="section__subtitle section__subtitle--intro">{MY_TITLE}</p>

    <img src="/img/self.webp" width="250" height="262" alt="Photo of me." class="intro__img" />
  </section>

  <!-- Templates -->
  <template id="template-skills">
    <section class="my-services" id="services">
      <h2 class="section__title section__title--services">What I do</h2>
      <div class="services"></div>
      <a href="#work" class="btn">My Work</a>
    </section>
  </template>

  <!-- The core Firebase JS SDK is always required and must be listed first -->
  <script defer src="/__/firebase/8.3.0/firebase-app.js"></script>
  <script defer src="/__/firebase/8.3.0/firebase-firestore.js"></script>
  <!-- Website js -->
  <script defer type="module" src="/js/index.js"></script>
</body>
</html>
