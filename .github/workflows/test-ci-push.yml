name: Build, lint and test
'on': push
jobs:
  build_and_deploy:

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v2

      - uses: actions/setup-node@v1
        with:
          node-version: '14.x'

      - name: Run Build
        run: |
          npm ci
          npm run build
        env:
          CI: true
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}

      - name: Run Lint
        run: npm run lint

      - name: Run Test
        run: npm run test