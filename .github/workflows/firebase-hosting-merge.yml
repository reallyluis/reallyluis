name: Deploy to Firebase Hosting to Production
'on':
  push:
    branches:
      - main
jobs:
  build_and_deploy:

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v2
      - name: Run Build
        run: |
          npm ci
          npm run build
        env:
          CI: true
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_REALLYLUIS_13B43 }}'
          channelId: live
          projectId: reallyluis-13b43
        env:
          FIREBASE_CLI_PREVIEWS: hostingchannels
